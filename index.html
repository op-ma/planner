<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Laporan Keuangan Pribadi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4e73df">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2620/2620402.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.datatables.net/v/bs5/jszip-3.10.1/dt-2.3.4/b-3.2.5/b-html5-3.2.5/r-3.0.7/datatables.min.css" rel="stylesheet">
  
  <style>
    :root {
      --font-family: 'Poppins', sans-serif;
      --font-size: 14px;
      --color-text: #2f3640;
      --color-muted: #999;
      --color-border: #ccc;
      --color-primary: #4e73df;
      --color-primary-hover: #3a5ecb;
      --color-info: #36b9cc;
      --color-info-hover: #2da5b7;
      --color-success: #1cc88a;
      --color-success-hover: #17a673;
      --color-danger: #e74a3b;
      --color-danger-hover: #cf3b2c;
      --color-secondary: #6c757d;
      --color-dark: #2c3e50;
      --gradient-primary: linear-gradient(135deg, #4e73df, #36b9cc);
      --gradient-bg: linear-gradient(135deg, #e0f0ff, #c0dfff);
      --shadow-sm: 0 2px 6px rgba(0,0,0,0.1);
      --radius-sm: 0.5rem;
      --radius-md: 1rem;
    }

    body {
      font-family: var(--font-family);
      background: var(--gradient-bg);
      color: var(--color-text);
      font-size: var(--font-size);
      min-height: 100vh;
    }

    h3 { color: #273c75; font-weight: 600; }

    .header {
      display: flex; align-items: center; justify-content: center;
      position: relative; flex-wrap: wrap; gap: 1rem;
      margin-bottom: 0.75rem; padding: 1rem;
      background: linear-gradient(90deg, var(--color-primary), var(--color-info));
      border-radius: var(--radius-sm); box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .header-title { text-align: center; }
    .header-title h3, .header-title p { margin: 0; color: #fff; }

    .filter-actions {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem;
      padding: 0.75rem 1rem; background: #fff;
      border-radius: var(--radius-sm); box-shadow: var(--shadow-sm);
    }

    @media (min-width: 992px) { .filter-actions { padding-left: 1rem; padding-right: 1rem; } }

    .filter-actions #filterPeriode { flex: 0 1 auto; max-width: 200px; min-width: 140px; }

    .filter-actions #totalInfo {
      padding: 0.5rem 1rem; border-radius: var(--radius-sm); color: #fff;
      font-weight: 600; background: var(--gradient-primary);
      box-shadow: var(--shadow-sm); white-space: nowrap;
    }

    .filter-actions .top-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .filter-actions .top-actions .btn { flex: 1 1 auto; min-width: 90px; font-weight: 500; font-size: 0.85rem;}
    .filter-actions .top-actions .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }

    select option[disabled][selected], select:invalid { color: var(--color-muted); }
    select option { color: #000; }
    input[type="date"] { color: var(--color-muted); }
    input[type="date"]:valid { color: #000; }
    input::placeholder, textarea::placeholder { color: var(--color-muted) !important; opacity: 1 !important; }

    input.form-control, select.form-select, textarea {
      border-radius: var(--radius-sm); border: 1px solid var(--color-border);
      font-size: 0.9rem; transition: all 0.3s;
    }

    input.form-control:focus, select.form-select:focus, textarea:focus {
      border-color: var(--color-primary); box-shadow: 0 0 8px rgba(78,115,223,0.3);
    }

    .btn { border-radius: var(--radius-sm); font-weight: 500; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
    .btn-primary { background: var(--color-primary); border: none; }
    .btn-info { background: var(--color-info); border: none; }
    .btn-success { background: var(--color-success); border: none; }
    .btn-danger { background: var(--color-danger); border: none; }
    .btn-dark { background: var(--color-dark); border: none; color: #fff;}
    .btn-secondary { background: var(--color-secondary); border: none; color: #fff;}
    .btn-outline-secondary { border: 1px solid var(--color-secondary); color: var(--color-secondary); background: transparent; }
    .btn-outline-secondary:hover { background: var(--color-secondary); color: #fff; }

    .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table.dataTable th, table.dataTable td {
      white-space: nowrap; vertical-align: middle; padding: 0.35rem 0.5rem;
      text-align: left !important; line-height: 1.15; color: #555;
    }
    table.dataTable th {
      background: linear-gradient(135deg, #4e73df, #36b9cc); color: #fff;
      font-weight: 600; text-align: center; border-bottom: none; padding: 0.5rem;
    }
    table.dataTable td { font-weight: 400; }

    table.dataTable td .btn-sm {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.2rem 0.45rem; font-size: 0.85rem; line-height: 1; height: auto;
      margin: 0; background-color: transparent; border: none; color: inherit; transition: all 0.3s;
    }
    table.dataTable td .btn-sm + .btn-sm { margin-left: 0.25rem; }
    table.dataTable td .btn-sm.btn-warning:hover { background-color: #ffc107; color: #fff; }
    table.dataTable td .btn-sm.btn-danger:hover { background-color: #e74a3b; color: #fff; }

    @media (max-width: 768px) {
      table.dataTable th, table.dataTable td { font-size: 0.75rem; padding: 0.3rem 0.45rem; }
      table.dataTable td .btn-sm { padding: 0.15rem 0.35rem; font-size: 0.8rem; }
    }

    .modal-dialog { width: 100%; }
    #formModal .modal-dialog, #settingsModal .modal-dialog { max-width: 500px; }
    #detailModal .modal-dialog, .custom-modal-width { max-width: 70%; }

    .modal-content { display: flex; flex-direction: column; max-height: 90vh; border-radius: var(--radius-md); }
    .modal-header {
      border-bottom: none; flex-shrink: 0; padding: 1rem 1.5rem; color: #fff;
      background: var(--gradient-primary); box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
    }
    .modal-header .modal-title { font-weight: 600; font-size: 1.1rem; }
    .modal-body { flex: 1 1 auto; overflow-y: auto; padding: 1rem 1.5rem; max-height: 70vh; }
    .modal-footer {
      flex-shrink: 0; border-top: none; padding: 0.75rem 1.5rem;
      background: linear-gradient(90deg, #f1f3f6, #e0e6f2); box-shadow: 0 -2px 6px rgba(0,0,0,0.05);
      border-radius: 0 0 var(--radius-md) var(--radius-md);
    }

    .summary-card { border: none; border-radius: 1rem; transition: all 0.3s ease; position: relative; overflow: hidden; }
    .summary-card::before { content: ""; position: absolute; inset: 0; background: rgba(255, 255, 255, 0.1); opacity: 0; transition: opacity 0.3s ease; }
    .summary-card:hover::before { opacity: 1; }
    .summary-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15); }

    @media (max-width: 768px) {
      #formModal .modal-dialog, #detailModal .modal-dialog, #settingsModal .modal-dialog, .custom-modal-width {
        max-width: 95% !important; width: 95% !important; margin: 0.5rem auto !important;
      }
      .modal-header { padding: 0.75rem 1rem !important; }
      .modal-body { padding: 1rem !important; max-height: 60vh !important; }
      .modal-footer { padding: 0.5rem 1rem !important; }

      .filter-actions { flex-direction: column !important; align-items: stretch !important; }
      .filter-actions #filterPeriode, .filter-actions #totalInfo, .filter-actions .top-actions {
        width: 100% !important; max-width: 100% !important; flex: 1 1 100% !important;
      }
      .filter-actions .top-actions .btn { flex: 1 1 45% !important; }
      .filter-actions #filterPeriode select { width: 100% !important; }
      .filter-actions #totalInfo { font-size: 0.9rem; padding: 0.75rem; text-align: center; }
      .filter-actions .top-actions { flex-direction: row !important; gap: 0.5rem; flex-wrap: wrap;}
      .header img.logo, .logo-text { display: none !important; }
      .container { width: 100% !important; max-width: 100% !important; padding-left: 0 !important; padding-right: 0 !important; }
      body { padding-left: 0 !important; padding-right: 0 !important; }
      .card, .filter-actions { padding-left: 1rem; padding-right: 1rem; border-radius: 0; }
      .header { border-radius: 0; }
    }
  </style>

  <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/v/bs5/jszip-3.10.1/dt-2.3.4/b-3.2.5/b-html5-3.2.5/r-3.0.7/datatables.min.js"></script>
</head>

<body class="p-2">
  <div class="container">
    <div class="header">
      <div class="header-title">
      <h3><i class="fa-solid fa-wallet me-2 text-warning"></i>Catatan Keuangan</h3>
      <p>Planner V.1</p>
    </div>
    </div>

    <div class="filter-actions">
      <select id="filterPeriode" class="form-select shadow-sm mb-1 mb-md-0">
        <option value="all">Semua Data</option>
        <option value="mingguan">Minggu Ini</option>
        <option value="bulanan">Bulan Ini</option>
        <option value="tahunan">Tahun Ini</option>
      </select>

      <div id="totalInfo">Total Saldo: Rp 0</div>

      <div class="top-actions">
        <input type="file" id="fileRestore" accept=".json" style="display: none;">
        
        <button class="btn btn-secondary" id="btnBackup" title="Backup"><i class="bi bi-cloud-download"></i> Backup</button>
        <button class="btn btn-outline-secondary" id="btnRestoreTrigger" title="Restore"><i class="bi bi-cloud-upload"></i> Restore</button>
        <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#settingsModal" title="Pengaturan Data"><i class="bi bi-gear-fill"></i> Data</button>
        
        <button class="btn btn-info text-white" data-bs-toggle="modal" data-bs-target="#detailModal"><i class="bi bi-bar-chart-fill"></i> Detail</button>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#formModal"><i class="bi bi-plus-circle"></i> Tambah</button>
      </div>
    </div>

    <div class="card p-2 shadow-sm">
      <div class="table-responsive">
        <table id="tabelData" class="table table-striped table-bordered align-middle mb-0 w-100"></table>
      </div>
    </div>

    <div class="modal fade" id="formModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content d-flex flex-column shadow-lg">
          <div class="modal-header py-3">
            <h4 class="modal-title d-flex align-items-center gap-2"><i class="bi bi-journal-text fs-3"></i> Tambah Catatan</h4>
            <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body flex-grow-1 overflow-auto">
            <form id="transaksiForm">
              <input type="hidden" id="idTransaksi">
              <div class="mb-2">
                <label class="form-label mb-1"><i class="bi bi-calendar-date me-1"></i> Tanggal</label>
                <input type="date" id="tanggal" class="form-control" required>
              </div>
              <div class="mb-2">
                <label class="form-label mb-1"><i class="bi bi-arrow-left-right me-1"></i> Jenis</label>
                <select id="jenis" class="form-select" required></select>
              </div>
              <div class="mb-2">
                <label class="form-label mb-1"><i class="bi bi-tags me-1"></i> Kategori</label>
                <select id="kategori" class="form-select" required></select>
              </div>
              <div class="mb-2">
                <label class="form-label mb-1"><i class="bi bi-cash-stack me-1"></i> Jumlah (Rp)</label>
                <input type="text" id="jumlah" inputmode="numeric" class="form-control" required>
              </div>
              <div class="mb-2">
                <label class="form-label mb-1"><i class="bi bi-credit-card me-1"></i> Metode</label>
                <select id="metode" class="form-select" required></select>
              </div>
              <div class="mb-2">
                <label class="form-label mb-1"><i class="bi bi-paperclip me-1"></i> Bukti/File (Tersimpan di HP)</label>
                <input type="file" id="fileUpload" class="form-control" accept="image/*,application/pdf">
              </div>
              <div class="mb-2">
                <label class="form-label mb-1"><i class="bi bi-chat-text me-1"></i> Deskripsi</label>
                <textarea id="deskripsi" class="form-control" rows="2"></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer justify-content-center py-2">
            <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
            <button class="btn btn-primary" id="btnSimpan">Simpan</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="settingsModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
          <div class="modal-header py-3 bg-dark text-white" style="background: var(--color-dark);">
            <h4 class="modal-title d-flex align-items-center gap-2"><i class="bi bi-gear-fill"></i> Tambah Master Data</h4>
            <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            
            <div class="mb-3">
              <label class="form-label fw-semibold text-primary"><i class="bi bi-arrow-left-right"></i> Tambah Jenis Transaksi</label>
              <div class="input-group">
                <input type="text" id="newJenis" class="form-control" placeholder="Cth: Hutang, Piutang">
                <button class="btn btn-primary" onclick="addJenis()"><i class="bi bi-plus"></i> Tambah</button>
              </div>
            </div>
            
            <hr class="my-3">

            <div class="mb-3">
              <label class="form-label fw-semibold text-primary"><i class="bi bi-tags"></i> Tambah Kategori</label>
              <select id="selectJenisForKategori" class="form-select mb-2"></select>
              <div class="input-group">
                <input type="text" id="newKategori" class="form-control" placeholder="Kategori baru...">
                <button class="btn btn-primary" onclick="addKategori()"><i class="bi bi-plus"></i> Tambah</button>
              </div>
            </div>

            <hr class="my-3">

            <div class="mb-2">
              <label class="form-label fw-semibold text-primary"><i class="bi bi-credit-card"></i> Tambah Metode Pembayaran</label>
              <div class="input-group">
                <input type="text" id="newMetode" class="form-control" placeholder="Cth: ShopeePay, QRIS">
                <button class="btn btn-primary" onclick="addMetode()"><i class="bi bi-plus"></i> Tambah</button>
              </div>
            </div>

          </div>
          <div class="modal-footer justify-content-center py-2">
            <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Tutup</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered custom-modal-width">
        <div class="modal-content d-flex flex-column shadow-lg">
           <div class="modal-header py-3">
             <h4 class="modal-title d-flex align-items-center gap-2"><i class="bi bi-graph-up fs-3"></i> Detail Catatan</h4>
             <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
           </div>
           <div class="modal-body flex-grow-1 overflow-auto">
             <div class="row text-center mb-3 g-2">
                <div class="col-4"><div class="card bg-success text-white"><div class="card-body p-2"><h6 style="font-size:0.8rem;">Pemasukan</h6><h5 id="cardPemasukan">Rp 0</h5></div></div></div>
                <div class="col-4"><div class="card bg-danger text-white"><div class="card-body p-2"><h6 style="font-size:0.8rem;">Pengeluaran</h6><h5 id="cardPengeluaran">Rp 0</h5></div></div></div>
                <div class="col-4"><div class="card bg-primary text-white"><div class="card-body p-2"><h6 style="font-size:0.8rem;">Saldo</h6><h5 id="cardSaldo">Rp 0</h5></div></div></div>
             </div>
             <div class="table-responsive"><table id="detailTable" class="table table-striped table-bordered w-100"></table></div>
           </div>
           <div class="modal-footer justify-content-center py-2"><button class="btn btn-outline-secondary" data-bs-dismiss="modal">Tutup</button></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Daftarkan Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW Error:', err));
      });
    }

    // Inisialisasi Database IndexedDB
    const db = new Dexie("HalimahFinanceDB");
    db.version(1).stores({
      transaksi: '++id, tanggal, jenis, kategori, jumlah, metode'
    });

    // ==========================================
    // SISTEM MASTER DATA (LOCAL STORAGE)
    // ==========================================
    let referensiData = {};

    function initReferensi() {
      const stored = localStorage.getItem('halimah_referensi');
      if (stored) {
        referensiData = JSON.parse(stored);
      } else {
        // Data default jika baru pertama kali buka
        referensiData = {
          kategoriPerJenis: {
            "Pemasukan": ["Penjualan Baju", "Reseller", "Modal Awal", "Lain-lain"],
            "Pengeluaran": ["Bahan Baku", "Gaji Karyawan", "Operasional", "Ongkir", "Lain-lain"]
          },
          metode: ["Cash", "Transfer Bank", "E-Wallet"]
        };
        saveReferensiLocal();
      }
    }

    function saveReferensiLocal() {
      localStorage.setItem('halimah_referensi', JSON.stringify(referensiData));
    }

    // Fungsi Tambah Master Data
    function addJenis() {
      const val = $("#newJenis").val().trim();
      if (!val) return;
      if (referensiData.kategoriPerJenis[val]) {
        return Swal.fire('Oops', 'Jenis ini sudah ada!', 'warning');
      }
      referensiData.kategoriPerJenis[val] = [];
      saveReferensiLocal();
      loadDropdown(); // Refresh dropdown
      
      $("#newJenis").val('');
      Swal.fire({icon: 'success', title: 'Berhasil', text: 'Jenis Transaksi ditambahkan!', timer: 1500, showConfirmButton: false});
    }

    function addKategori() {
      const jenis = $("#selectJenisForKategori").val();
      const val = $("#newKategori").val().trim();
      if (!jenis || !val) return Swal.fire('Oops', 'Pilih jenis dan isi kategori!', 'warning');
      
      if (referensiData.kategoriPerJenis[jenis].includes(val)) {
         return Swal.fire('Oops', 'Kategori ini sudah ada di jenis tersebut!', 'warning');
      }
      referensiData.kategoriPerJenis[jenis].push(val);
      saveReferensiLocal();
      loadDropdown();
      
      $("#newKategori").val('');
      Swal.fire({icon: 'success', title: 'Berhasil', text: 'Kategori ditambahkan!', timer: 1500, showConfirmButton: false});
    }

    function addMetode() {
      const val = $("#newMetode").val().trim();
      if (!val) return;
      if (referensiData.metode.includes(val)) {
        return Swal.fire('Oops', 'Metode ini sudah ada!', 'warning');
      }
      referensiData.metode.push(val);
      saveReferensiLocal();
      loadDropdown();
      
      $("#newMetode").val('');
      Swal.fire({icon: 'success', title: 'Berhasil', text: 'Metode Pembayaran ditambahkan!', timer: 1500, showConfirmButton: false});
    }

    const formatRibuan = (angka) => angka ? angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") : '0';
    const unformatRibuan = (str) => str ? Number(str.toString().replace(/\./g, '')) : 0;

    let dataTable, detailTable;

    $(document).ready(async function () {
      initReferensi();
      loadDropdown();
      setupCustomFilter();
      await loadData();
      initEventListeners();
    });

    function initEventListeners() {
      $("#btnSimpan").click(saveData);
      $('#filterPeriode').change(() => dataTable.draw());
      $('#formModal').on('hidden.bs.modal', resetForm);
      $("#jumlah").on("input", function () { $(this).val(formatRibuan(unformatRibuan($(this).val()))); });
      $("#jenis").change(handleJenisChange);
      $('#detailModal').on('shown.bs.modal', loadDetailData);
      
      // EVENT BACKUP & RESTORE
      $("#btnBackup").click(backupData);
      $("#btnRestoreTrigger").click(() => $("#fileRestore").click());
      $("#fileRestore").change(restoreData);
    }

    function loadDropdown() {
      // Form Utama
      $("#jenis").html(`<option value="" disabled selected hidden>Pilih Jenis</option>
        ${Object.keys(referensiData.kategoriPerJenis).map(j => `<option value="${j}">${j}</option>`).join('')}`);
      $("#kategori").html('<option value="" disabled selected hidden>Pilih Kategori</option>');
      $("#metode").html(`<option value="" disabled selected hidden>Pilih Metode</option>
        ${referensiData.metode.map(m => `<option value="${m}">${m}</option>`).join('')}`);

      // Modal Settings (Select Jenis untuk form Kategori)
      $("#selectJenisForKategori").html(`<option value="" disabled selected hidden>Pilih Jenis Transaksi</option>
        ${Object.keys(referensiData.kategoriPerJenis).map(j => `<option value="${j}">${j}</option>`).join('')}`);
    }

    function handleJenisChange() {
      const jenis = $(this).val();
      const kategoriSelect = $("#kategori");
      kategoriSelect.html('<option value="" disabled selected hidden>Pilih Kategori</option>');
      (referensiData.kategoriPerJenis[jenis] || []).forEach(k => {
        kategoriSelect.append(`<option value="${k}">${k}</option>`);
      });
    }

    async function loadData() {
      const data = await db.transaksi.reverse().toArray(); 
      if (dataTable) dataTable.clear().destroy();

      const dtData = data.map(r => [
        r.id, r.tanggal, r.jenis, r.kategori, r.jumlah, r.metode, r.deskripsi,
        r.fileBase64 ? `<a href="${r.fileBase64}" download="bukti_${r.id}">Unduh File</a>` : "-",
        `<button class='btn btn-sm btn-warning' onclick='editData(${r.id})'><i class='bi bi-pencil-square'></i></button>
         <button class='btn btn-sm btn-danger' onclick='deleteData(${r.id})'><i class='bi bi-trash'></i></button>`
      ]);

      dataTable = $('#tabelData').DataTable({
        data: dtData,
        columns: [
          { title: "ID" }, { title: "Tanggal" }, { title: "Jenis" }, { title: "Kategori" },
          { title: "Jumlah (Rp)", render: (data, type) => type === 'display' ? formatRibuan(data) : data },
          { title: "Metode" }, { title: "Deskripsi" }, { title: "File" }, { title: "Aksi" }
        ],
        pageLength: 7, responsive: true, footerCallback: updateFooter,
        language:{ search:"_INPUT_", searchPlaceholder:"Cari...", paginate:{previous:"<",next:">"}, lengthMenu:"_MENU_ Baris", info: "Menampilkan _START_ s.d _END_ dari _TOTAL_ data", infoEmpty: "0 data", zeroRecords: "Tidak ada data" }
      });
    }

    function updateFooter() {
      let totalIn = 0, totalOut = 0;
      this.api().rows({ filter: 'applied' }).data().each(r => {
        const jumlah = Number(r[4]);
        if (r[2] === 'Pemasukan') totalIn += jumlah; else totalOut += jumlah;
      });
      $('#totalInfo').html(`Saldo: Rp ${formatRibuan(totalIn - totalOut)}`);
    }

    async function saveData() {
      const id = $("#idTransaksi").val();
      const data = {
        tanggal: $("#tanggal").val(),
        jenis: $("#jenis").val(),
        kategori: $("#kategori").val(),
        jumlah: unformatRibuan($("#jumlah").val()),
        metode: $("#metode").val(),
        deskripsi: $("#deskripsi").val()
      };

      if (!data.tanggal || !data.jenis || !data.kategori || !data.jumlah) {
        return Swal.fire('Error', 'Lengkapi form wajib!', 'warning');
      }

      Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      const fileInput = document.getElementById('fileUpload').files[0];
      if (fileInput) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          data.fileBase64 = e.target.result; 
          await executeSave(id, data);
        };
        reader.readAsDataURL(fileInput);
      } else {
        if (id) {
          const oldData = await db.transaksi.get(Number(id));
          if (oldData && oldData.fileBase64) data.fileBase64 = oldData.fileBase64;
        }
        await executeSave(id, data);
      }
    }

    async function executeSave(id, data) {
      try {
        if (id) {
          await db.transaksi.update(Number(id), data);
        } else {
          await db.transaksi.add(data);
        }
        Swal.fire('Berhasil', 'Data tersimpan offline.', 'success');
        $("#formModal").modal('hide');
        loadData();
      } catch (err) {
        Swal.fire('Error', 'Gagal menyimpan data.', 'error');
      }
    }

    async function editData(id) {
      const data = await db.transaksi.get(id);
      if (!data) return;
      
      $("#idTransaksi").val(data.id);
      $("#tanggal").val(data.tanggal);
      $("#jenis").val(data.jenis).change();
      $("#kategori").val(data.kategori);
      $("#jumlah").val(formatRibuan(data.jumlah));
      $("#metode").val(data.metode);
      $("#deskripsi").val(data.deskripsi);
      
      new bootstrap.Modal('#formModal').show();
    }

    function deleteData(id) {
      Swal.fire({ title: 'Yakin hapus?', icon: 'warning', showCancelButton: true }).then(async (res) => {
        if (res.isConfirmed) {
          await db.transaksi.delete(id);
          Swal.fire('Terhapus', '', 'success');
          loadData();
        }
      });
    }

    function resetForm() {
      $("#transaksiForm")[0].reset();
      $("#idTransaksi").val('');
      $("#jenis").val('').trigger('change');
    }

    function setupCustomFilter() {
      $.fn.dataTable.ext.search.push(function (settings, data) {
        const periode = $('#filterPeriode').val();
        if (!periode || periode === 'all') return true;
        const tanggal = new Date(data[1]);
        const now = new Date();
        
        if (periode === 'mingguan') {
           const aWeekAgo = new Date(); aWeekAgo.setDate(now.getDate() - 7);
           return tanggal >= aWeekAgo;
        }
        if (periode === 'bulanan') return tanggal.getMonth() === now.getMonth() && tanggal.getFullYear() === now.getFullYear();
        if (periode === 'tahunan') return tanggal.getFullYear() === now.getFullYear();
        return true;
      });
    }

    async function loadDetailData() {
      const data = await db.transaksi.toArray();
      // Logic for chart/table update can go here
    }

    // ==========================================
    // FUNGSI BACKUP & RESTORE
    // ==========================================
    async function backupData() {
      try {
        const data = await db.transaksi.toArray();
        if (data.length === 0) {
          return Swal.fire('Info', 'Tidak ada data untuk dibackup.', 'info');
        }
        
        // Backup juga preferensi kategori manual
        const backupPackage = {
          transaksi: data,
          referensi: referensiData
        };

        const jsonString = JSON.stringify(backupPackage);
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        const dateStr = new Date().toISOString().slice(0, 10);
        a.download = `Backup_PlannerKu_${dateStr}.json`;
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        Swal.fire('Berhasil', 'File Backup berhasil diunduh.', 'success');
      } catch (err) {
        Swal.fire('Error', 'Gagal melakukan backup.', 'error');
      }
    }

    async function restoreData(event) {
      const file = event.target.files[0];
      if (!file) return;

      Swal.fire({
        title: 'Konfirmasi Restore',
        text: 'Data lama dengan ID sama akan ditimpa. Lanjutkan?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Ya, Restore!'
      }).then((result) => {
        if (result.isConfirmed) {
          const reader = new FileReader();
          reader.onload = async function(e) {
            try {
              let importedData = JSON.parse(e.target.result);
              
              Swal.fire({ title: 'Merestore Data...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
              
              // Cek apakah ini backup format baru (ada referensi data manual) atau lama (hanya array transaksi)
              if (Array.isArray(importedData)) {
                await db.transaksi.bulkPut(importedData);
              } else if (importedData.transaksi && importedData.referensi) {
                await db.transaksi.bulkPut(importedData.transaksi);
                referensiData = importedData.referensi;
                saveReferensiLocal();
                loadDropdown();
              } else {
                throw new Error("Format file salah");
              }
              
              Swal.fire('Berhasil', 'Data berhasil direstore.', 'success');
              loadData(); 
            } catch (err) {
              Swal.fire('Error', 'File backup tidak valid atau rusak.', 'error');
            }
            $("#fileRestore").val('');
          };
          reader.readAsText(file);
        } else {
          $("#fileRestore").val(''); 
        }
      });
    }

  </script>
